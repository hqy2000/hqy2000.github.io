<!DOCTYPE html>
<html>
<head>
    <title>Qingyang Hu</title>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="https://unpkg.com/xp.css"/>
    <style>
        html, body, .container {
            height: 100%;
            overflow: hidden;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            zoom: 1.5;
        }
    </style>
</head>

<body>
<div class="container">
    <div class="window" style="width: 500px">
        <div class="title-bar">
            <div class="title-bar-text">Qingyang's Main Menu</div>
        </div>
        <div class="window-body">
            <fieldset>
                <legend>Professional Links</legend>
                <div class="field-row">
                    <button id="resume">Resume</button>
                    <label for="resume">Check out my latest resume for a detailed look at my professional
                        journey.</label>
                </div>
                <div class="field-row">
                    <button id="linkedin">LinkedIn</button>
                    <label for="linkedin">Connect with me on LinkedIn to see my professional network and
                        endorsements.</label>
                </div>
                <div class="field-row">
                    <button id="github">GitHub</button>
                    <label for="github">Explore my coding projects and repositories on GitHub.</label>
                </div>
            </fieldset>
            <fieldset>
                <legend>Just For Fun</legend>
                <div class="field-row">
                    <button id="youtube">YouTube</button>
                    <label for="youtube">Watch my videos to explore the fascinating world of trains.
                    </label>
                </div>
            </fieldset>
        </div>
        <div class="status-bar">
            <p class="status-bar-field">Contact admin@hqy2000.com for help.</p>
        </div>
    </div>
</div>

</body>
</html>
