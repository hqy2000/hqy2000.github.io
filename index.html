<!DOCTYPE html>
<html>
<head>
    <title>Qingyang Hu | Links</title>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="https://unpkg.com/xp.css"/>
    <style>
        html, body, .container {
            height: 100%;
            overflow: hidden;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            zoom: 1.5;

    </style>
    <script>
        function openUrl(url) {
            window.open(url, '_blank');

<body>
<div class="container">
    <div class="window" style="width: 500px">
        <div class="title-bar">
            <div class="title-bar-text">Qingyang Hu — Main Menu</div>
        </div>
        <div class="window-body">
            <fieldset>
                <legend>Professional Highlights</legend>
                <div class="field-row">
                    <button id="resume" onclick="openUrl('Qingyang_Hu_20251101.pdf')">Resume</button>
                    <label for="resume">Browse my resume for a concise overview of experience, impact, and
                        skills.</label>
                </div>
                <div class="field-row">
                    <button id="linkedin" onclick="openUrl('https://www.linkedin.com/in/hqy2000/')">LinkedIn</button>
                    <label for="linkedin">Join me on LinkedIn to follow career updates and professional
                        collaborations.</label>
                </div>
                <div class="field-row">
                    <button id="github" onclick="openUrl('https://github.com/hqy2000')">GitHub</button>
                    <label for="github">Explore open-source projects, tooling experiments, and coding deep
                        dives.</label>
                </div>
            </fieldset>
            <fieldset>
                <legend>Beyond Work</legend>
                <div class="field-row">
                    <button id="youtube" onclick="openUrl('https://www.youtube.com/@njliner')">YouTube</button>

            </fieldset>

    </div>
</div>
